naftiko: 1.0.0-alpha2
info:
  label: Decentro Ledger API — Transactions
  description: 'Decentro Ledger API — Transactions. 1 operations. Lead operation: List transactions. Self-contained Naftiko
    capability covering one Decentro business surface.'
  tags:
  - Decentro
  - Transactions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DECENTRO_API_KEY: DECENTRO_API_KEY
capability:
  consumes:
  - type: http
    namespace: ledger-transactions
    baseUri: https://in.decentro.tech
    description: Decentro Ledger API — Transactions business capability. Self-contained, no shared references.
    resources:
    - name: v2-ledger-transactions
      path: /v2/ledger/transactions
      operations:
      - name: listledgertransactions
        method: GET
        description: List transactions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: client_secret
      value: '{{env.DECENTRO_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: ledger-transactions-rest
    port: 8080
    description: REST adapter for Decentro Ledger API — Transactions. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v2/ledger/transactions
      name: v2-ledger-transactions
      description: REST surface for v2-ledger-transactions.
      operations:
      - method: GET
        name: listledgertransactions
        description: List transactions
        call: ledger-transactions.listledgertransactions
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ledger-transactions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Decentro Ledger API — Transactions. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-transactions
      description: List transactions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ledger-transactions.listledgertransactions
      outputParameters:
      - type: object
        mapping: $.
