naftiko: 1.0.0-alpha2
info:
  label: Decentro KYC & Onboarding API — Verification
  description: 'Decentro KYC & Onboarding API — Verification. 1 operations. Lead operation: Validate against public registry.
    Self-contained Naftiko capability covering one Decentro business surface.'
  tags:
  - Decentro
  - Verification
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DECENTRO_API_KEY: DECENTRO_API_KEY
capability:
  consumes:
  - type: http
    namespace: kyc-verification
    baseUri: https://in.decentro.tech
    description: Decentro KYC & Onboarding API — Verification business capability. Self-contained, no shared references.
    resources:
    - name: v2-kyc-public_registry-validate
      path: /v2/kyc/public_registry/validate
      operations:
      - name: validatepublicregistry
        method: POST
        description: Validate against public registry
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: client_secret
      value: '{{env.DECENTRO_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: kyc-verification-rest
    port: 8080
    description: REST adapter for Decentro KYC & Onboarding API — Verification. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/v2/kyc/public-registry/validate
      name: v2-kyc-public-registry-validate
      description: REST surface for v2-kyc-public_registry-validate.
      operations:
      - method: POST
        name: validatepublicregistry
        description: Validate against public registry
        call: kyc-verification.validatepublicregistry
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: kyc-verification-mcp
    port: 9090
    transport: http
    description: MCP adapter for Decentro KYC & Onboarding API — Verification. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: validate-against-public-registry
      description: Validate against public registry
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: kyc-verification.validatepublicregistry
      outputParameters:
      - type: object
        mapping: $.
