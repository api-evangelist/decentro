naftiko: 1.0.0-alpha2
info:
  label: Decentro Ledger API — Accounts
  description: 'Decentro Ledger API — Accounts. 2 operations. Lead operation: Create a ledger account. Self-contained Naftiko
    capability covering one Decentro business surface.'
  tags:
  - Decentro
  - Accounts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DECENTRO_API_KEY: DECENTRO_API_KEY
capability:
  consumes:
  - type: http
    namespace: ledger-accounts
    baseUri: https://in.decentro.tech
    description: Decentro Ledger API — Accounts business capability. Self-contained, no shared references.
    resources:
    - name: v2-ledger-account
      path: /v2/ledger/account
      operations:
      - name: createledgeraccount
        method: POST
        description: Create a ledger account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-ledger-account-id
      path: /v2/ledger/account/{id}
      operations:
      - name: getledgeraccount
        method: GET
        description: Get a ledger account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
    authentication:
      type: apikey
      key: client_secret
      value: '{{env.DECENTRO_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: ledger-accounts-rest
    port: 8080
    description: REST adapter for Decentro Ledger API — Accounts. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v2/ledger/account
      name: v2-ledger-account
      description: REST surface for v2-ledger-account.
      operations:
      - method: POST
        name: createledgeraccount
        description: Create a ledger account
        call: ledger-accounts.createledgeraccount
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/ledger/account/{id}
      name: v2-ledger-account-id
      description: REST surface for v2-ledger-account-id.
      operations:
      - method: GET
        name: getledgeraccount
        description: Get a ledger account
        call: ledger-accounts.getledgeraccount
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ledger-accounts-mcp
    port: 9090
    transport: http
    description: MCP adapter for Decentro Ledger API — Accounts. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: create-ledger-account
      description: Create a ledger account
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: ledger-accounts.createledgeraccount
      outputParameters:
      - type: object
        mapping: $.
    - name: get-ledger-account
      description: Get a ledger account
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ledger-accounts.getledgeraccount
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
