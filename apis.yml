description: >-
  Decentro is a banking-as-a-service platform that provides businesses with seamless integration to Indian banking
  infrastructure - including payments (UPI, IMPS, NEFT, RTGS), virtual accounts, KYC, ledger primitives, and
  credit-bureau data. Decentro publishes a developer portal and Postman collection covering six API categories: KYC &
  Onboarding, Bytes (alternate data), Scanner (forensics), Payments, Virtual Accounts, and Ledger.
apis:
  - aid: decentro:kyc-api
    name: Decentro KYC & Onboarding API
    description: >-
      Identity verification, customer onboarding, DigiLocker integration, Aadhaar OTP, document classification, and face
      match.
    humanURL: https://docs.decentro.tech/
    baseURL: https://in.decentro.tech
    tags:
      - Aadhaar
      - DigiLocker
      - Forensics
      - KYC
      - Onboarding
    properties:
      - type: Documentation
        url: https://docs.decentro.tech/
      - type: OpenAPI
        url: openapi/decentro-kyc-api-openapi.yml
  - aid: decentro:payments-api
    name: Decentro Payments API
    description: Collections, payouts, ENACH mandates, UPI Autopay, settlements, and refunds for the Indian banking system.
    humanURL: https://docs.decentro.tech/
    baseURL: https://in.decentro.tech
    tags:
      - Collections
      - Mandates
      - Payouts
      - Settlements
      - UPI
    properties:
      - type: Documentation
        url: https://docs.decentro.tech/
