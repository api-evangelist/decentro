specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Decentro
providerId: decentro
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Banking
  - Banking-as-a-Service
  - FinTech
  - India
  - KYC
  - Payments
description: Decentro is a banking-as-a-service platform for the Indian market. Its commercial
  model is per-API-call pricing across six product categories — KYC and Onboarding, Bytes
  (alternate data), Scanner (forensics), Payments (UPI/IMPS/NEFT/RTGS), Virtual Accounts, and
  Ledger — combined with bank-side surcharges that vary by sponsor bank and rail. Decentro does
  not publish numeric per-call rates on the public site; all pricing is quoted to onboarded
  enterprises through the developer portal at in.decentro.tech and the sales team.
sources:
  - https://decentro.tech
  - https://in.decentro.tech
notes: No public pricing page found. Decentro markets pay-per-API-call but does not publish
  numeric INR rates publicly. Reconciliation requires onboarded portal access or a sales quote.
plans:
  - id: decentro-sandbox
    name: Sandbox
    type: freemium
    description: Free sandbox access for evaluation and integration. Available after developer
      portal sign-up. Sandbox traffic does not move real money or hit production rails.
    entries:
      - label: Sandbox API calls
        name: sandbox_calls
        type: quota
        metric: request
        limit: see decentro portal
        timeFrame: month
        geo: IN
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Sandbox environment
      - name: Developer portal access
      - name: Postman collection
      - name: Decentro KYC & Onboarding API (sandbox)
      - name: Decentro Payments API (sandbox)
      - name: Decentro Virtual Accounts API (sandbox)
      - name: Decentro Ledger API (sandbox)
  - id: decentro-production
    name: Production
    type: usage-based
    description: Pay-per-API-call production access negotiated per customer. Pricing depends on
      the API category, monthly volume, and the sponsor-bank rail. Bank-side surcharges (UPI,
      IMPS, NEFT, RTGS, Aadhaar, DigiLocker) pass through to the customer.
    entries:
      - label: KYC and Onboarding calls
        name: kyc_calls
        type: metered
        metric: request
        limit: -1
        timeFrame: usage
        geo: IN
        unit: 1
        price: contact decentro
        userMultiplied: false
      - label: Bytes (alternate data) calls
        name: bytes_calls
        type: metered
        metric: request
        limit: -1
        timeFrame: usage
        geo: IN
        unit: 1
        price: contact decentro
        userMultiplied: false
      - label: Scanner (forensics) calls
        name: scanner_calls
        type: metered
        metric: request
        limit: -1
        timeFrame: usage
        geo: IN
        unit: 1
        price: contact decentro
        userMultiplied: false
      - label: Payments transactions
        name: payment_tx
        type: metered
        metric: transaction
        limit: -1
        timeFrame: usage
        geo: IN
        unit: 1
        price: contact decentro
        userMultiplied: false
      - label: Virtual Account operations
        name: va_operations
        type: metered
        metric: request
        limit: -1
        timeFrame: usage
        geo: IN
        unit: 1
        price: contact decentro
        userMultiplied: false
      - label: Ledger operations
        name: ledger_operations
        type: metered
        metric: request
        limit: -1
        timeFrame: usage
        geo: IN
        unit: 1
        price: contact decentro
        userMultiplied: false
    elements:
      - name: Decentro KYC & Onboarding API
      - name: Decentro Payments API (UPI, IMPS, NEFT, RTGS)
      - name: Decentro Virtual Accounts API
      - name: Decentro Ledger API
      - name: Decentro Bytes API
      - name: Decentro Scanner API
      - name: Webhook subscriptions
      - name: Production rails
