description: 'FOCUS-aligned FinOps for Decentro: pay-per-API-call usage billing across six product
  categories, with bank-side and regulator-side surcharges (UPI/IMPS/NEFT/RTGS, Aadhaar,
  DigiLocker, credit bureaus) passed through. Rates are negotiated per merchant and not public.'
sources:
  - https://decentro.tech
  - https://in.decentro.tech
notes: No public per-call INR rates. Meters reflect Decentro's product categories; dollar/INR
  values must come from the customer's portal or master service agreement.
billingModel:
  pricingCategory: Pay-As-You-Go + Pass-Through
  billingFrequency: Monthly
  billingCurrency: INR
  chargeCategories:
    - Usage
    - Tax
    - Adjustment
    - Refund
focusColumns:
  ServiceName: Decentro
  ServiceCategory: Banking-as-a-Service
  ServiceSubcategory: India FinTech Infrastructure
  ProviderName: Decentro
  PublisherName: Decentro Tech Pvt Ltd
  InvoiceIssuerName: Decentro Tech Pvt Ltd
  PricingCategory: Usage-Based
  PricingUnit: request
  BillingCurrency: INR
  ChargeCategory: Usage
  RegionId: IN
meters:
  - name: kyc_calls
    description: KYC, onboarding, Aadhaar, and DigiLocker verification calls.
    unit: request
    aggregation: count
    dimensions:
      - product
      - upstream_provider
      - merchant
  - name: payment_transactions
    description: Money-movement transactions across UPI, IMPS, NEFT, and RTGS rails.
    unit: transaction
    aggregation: count
    dimensions:
      - rail
      - sponsor_bank
      - direction
      - merchant
  - name: virtual_account_operations
    description: Virtual account create, fetch, balance, and reconciliation operations.
    unit: request
    aggregation: count
    dimensions:
      - operation
      - merchant
  - name: ledger_operations
    description: Ledger journal, account, and transaction operations.
    unit: request
    aggregation: count
    dimensions:
      - operation
      - merchant
  - name: bytes_calls
    description: Alternate-data and intelligence lookups.
    unit: request
    aggregation: count
    dimensions:
      - data_source
      - merchant
  - name: scanner_calls
    description: Forensics and document-fraud verification calls.
    unit: request
    aggregation: count
    dimensions:
      - check_type
      - merchant
  - name: bank_passthrough_charges
    description: Sponsor-bank and regulator surcharges passed through to the merchant.
    unit: transaction
    aggregation: sum
    dimensions:
      - rail
      - sponsor_bank
principles:
  - name: Visibility
    description: Use the Decentro merchant portal usage and settlement reports to track call
      volume by product category and rail. Reconcile pass-through bank charges line-by-line against
      the monthly invoice and settlement file.
  - name: Allocation
    description: Issue separate Decentro client_id / secret pairs per consuming product so calls
      can be attributed to a business line. Tag webhooks and ledger transactions with internal
      account identifiers for downstream attribution.
  - name: Optimization
    description: Cache KYC results subject to RBI re-KYC rules to avoid repeat lookups, route
      payouts through the cheapest acceptable rail (IMPS vs NEFT vs RTGS), and pre-fund virtual
      accounts during festival/salary peaks rather than retry-storming. Batch where the rail
      allows.
  - name: Accountability
    description: Designate a single ops owner for the Decentro relationship who reviews monthly
      settlement and bank surcharges, validates KPI guardrails (cost-per-onboarded-user,
      cost-per-payout), and renegotiates rates when volume thresholds are hit.
